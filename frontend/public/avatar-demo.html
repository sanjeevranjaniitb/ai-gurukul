<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Gurukul — Avatar API Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #16171d; color: #f3f4f6; padding: 24px; }
  h1 { text-align: center; margin-bottom: 24px; font-size: 24px; }
  .container { max-width: 900px; margin: 0 auto; display: flex; gap: 24px; }
  .left { width: 320px; flex-shrink: 0; }
  .right { flex: 1; }
  .avatar-frame { width: 300px; height: 300px; border-radius: 12px; overflow: hidden; background: #000; border: 2px solid #2e303a; margin-bottom: 16px; }
  .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
  .speaking-badge { text-align: center; color: #a78bfa; font-size: 13px; margin-bottom: 12px; }
  label { display: block; font-size: 13px; color: #9ca3af; margin-bottom: 4px; }
  input, textarea, select { width: 100%; padding: 10px; border: 1px solid #2e303a; border-radius: 6px; background: #1f2028; color: #f3f4f6; font-size: 14px; margin-bottom: 12px; }
  textarea { height: 80px; resize: vertical; }
  button { padding: 10px 20px; border: none; border-radius: 6px; background: #7c3aed; color: #fff; font-size: 14px; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { font-size: 13px; color: #9ca3af; margin-top: 8px; min-height: 20px; }
  .section { margin-bottom: 20px; padding: 16px; background: #1f2028; border-radius: 8px; }
  .section h3 { margin-bottom: 12px; font-size: 16px; }
  audio { width: 100%; margin-top: 8px; }
  video { width: 100%; border-radius: 8px; margin-top: 8px; }
</style>
</head>
<body>

<h1>🎓 AI Gurukul — Avatar API Demo</h1>

<div class="container">
  <div class="left">
    <div class="avatar-frame" id="avatarFrame">
      <img id="avatarImg" src="" alt="Avatar" style="display:none">
    </div>
    <div class="speaking-badge" id="speakingBadge"></div>

    <div class="section">
      <h3>1. Register Avatar</h3>
      <label>Upload face image</label>
      <input type="file" id="avatarFile" accept=".png,.jpg,.jpeg">
      <button onclick="registerAvatar()">Register</button>
      <div class="status" id="registerStatus"></div>
    </div>
  </div>

  <div class="right">
    <div class="section">
      <h3>2. Text to Speech</h3>
      <label>Text</label>
      <textarea id="ttsText">The attention mechanism allows the model to focus on different parts of the input sequence.</textarea>
      <button onclick="generateTTS()">Generate Audio</button>
      <button onclick="playVisemeAnimation()">Play with Lip Sync</button>
      <audio id="ttsAudio" controls style="display:none"></audio>
      <div class="status" id="ttsStatus"></div>
    </div>

    <div class="section">
      <h3>3. Real Lip-Sync Video</h3>
      <label>Text</label>
      <textarea id="videoText">The attention mechanism allows the model to focus on different parts of the input sequence.</textarea>
      <button onclick="generateVideo()">Generate Video (~20-30s)</button>
      <video id="videoPlayer" controls style="display:none"></video>
      <div class="status" id="videoStatus"></div>
    </div>
  </div>
</div>

<script>
const API = '';  // Same origin
let avatarId = null;
let visemes = {};
let charMap = {};
let audioUrl = null;
let audioDuration = 0;

async function registerAvatar() {
  const file = document.getElementById('avatarFile').files[0];
  if (!file) return alert('Select an image first');
  const status = document.getElementById('registerStatus');
  status.textContent = 'Uploading...';

  const form = new FormData();
  form.append('file', file);

  try {
    const res = await fetch(API + '/api/avatar/register', { method: 'POST', body: form });
    const data = await res.json();
    avatarId = data.avatar_id;
    status.textContent = `Registered: ${avatarId} (${data.duration_ms}ms)`;

    // Load visemes
    const vRes = await fetch(API + '/api/avatar/visemes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ avatar_id: avatarId }),
    });
    const vData = await vRes.json();
    visemes = vData.visemes;
    charMap = vData.char_to_viseme;

    // Show idle image
    const img = document.getElementById('avatarImg');
    img.src = visemes.idle;
    img.style.display = 'block';
    status.textContent += ' | Visemes loaded';
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }
}

async function generateTTS() {
  const text = document.getElementById('ttsText').value.trim();
  if (!text) return alert('Enter text');
  const status = document.getElementById('ttsStatus');
  status.textContent = 'Generating audio...';

  try {
    const res = await fetch(API + '/api/avatar/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const blob = await res.blob();
    audioDuration = parseFloat(res.headers.get('X-Duration-Seconds') || '3');
    audioUrl = URL.createObjectURL(blob);

    const audio = document.getElementById('ttsAudio');
    audio.src = audioUrl;
    audio.style.display = 'block';
    status.textContent = `Audio ready (${audioDuration.toFixed(1)}s)`;
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }
}

function playVisemeAnimation() {
  if (!audioUrl || !Object.keys(visemes).length) {
    return alert('Generate audio and register avatar first');
  }

  const text = document.getElementById('ttsText').value.trim();
  const img = document.getElementById('avatarImg');
  const badge = document.getElementById('speakingBadge');
  const audio = document.getElementById('ttsAudio');

  // Preload all viseme images
  const preloaded = {};
  for (const [name, url] of Object.entries(visemes)) {
    const i = new Image();
    i.src = url;
    preloaded[name] = i;
  }

  const charSpeed = text.length / audioDuration;
  let animFrame;

  audio.currentTime = 0;
  audio.play().then(() => {
    badge.textContent = '● Speaking...';
    const t0 = performance.now();

    function tick() {
      const elapsed = (performance.now() - t0) / 1000;
      if (elapsed >= audioDuration) {
        img.src = visemes.idle;
        badge.textContent = '';
        return;
      }
      const ci = Math.min(Math.floor(elapsed * charSpeed), text.length - 1);
      if (ci >= 0 && ci < text.length) {
        const ch = text[ci].toLowerCase();
        const vName = charMap[ch] || 'a';
        if (visemes[vName]) img.src = visemes[vName];
      }
      animFrame = requestAnimationFrame(tick);
    }
    animFrame = requestAnimationFrame(tick);
  }).catch(() => {
    audio.muted = true;
    audio.play();
  });
}

async function generateVideo() {
  if (!avatarId) return alert('Register avatar first');
  const text = document.getElementById('videoText').value.trim();
  if (!text) return alert('Enter text');
  const status = document.getElementById('videoStatus');
  status.textContent = 'Generating video (this takes ~20-30s)...';

  try {
    const res = await fetch(API + '/api/avatar/video', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, avatar_id: avatarId }),
    });
    const blob = await res.blob();
    const genMs = res.headers.get('X-Generation-Ms') || '?';
    const dur = res.headers.get('X-Duration-Seconds') || '?';

    const video = document.getElementById('videoPlayer');
    video.src = URL.createObjectURL(blob);
    video.style.display = 'block';
    video.play();
    status.textContent = `Video ready (${dur}s, generated in ${genMs}ms)`;
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
